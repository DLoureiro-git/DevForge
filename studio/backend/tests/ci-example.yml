# GitHub Actions - Playwright CI
# Colocar em: .github/workflows/playwright.yml

name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Testar em múltiplos viewports em paralelo
        project: [mobile-375, tablet-768, desktop-1280]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (backend)
        working-directory: ./studio/backend
        run: npm ci

      - name: Install dependencies (frontend)
        working-directory: ./studio/frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./studio/backend
        run: npx playwright install --with-deps

      - name: Start Frontend
        working-directory: ./studio/frontend
        run: |
          npm run build
          npm run preview &
          npx wait-on http://localhost:5679 --timeout 60000

      - name: Start Backend
        working-directory: ./studio/backend
        run: |
          npm run build
          npm start &
          npx wait-on http://localhost:5680 --timeout 60000
        env:
          DATABASE_URL: file:./test.db
          NODE_ENV: test

      - name: Run Playwright tests
        working-directory: ./studio/backend
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: http://localhost:5679

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: studio/backend/playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.project }}
          path: studio/backend/test-results/
          retention-days: 7

  # Job agregado para status final
  test-complete:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed!"
            exit 1
          fi
